<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原稿レイアウト詳細</title>

<style>
body{
  margin:0;
  font-family:"Helvetica","Arial",sans-serif;
  color:white;
  background: linear-gradient(180deg,#061a33,#1b3f6e,#0a2a4a);
  overflow-x:hidden;
}

/* ===== 星 ===== */
.star{
  position:fixed;
  background:white;
  border-radius:50%;
  pointer-events:none;
  opacity:0.8;
}

/* ===== 光 ===== */
.glow{
  position:fixed;
  width:180px;
  height:180px;
  background:radial-gradient(circle,rgba(255,255,255,0.25),transparent 70%);
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:screen;
}

/* ===== コンテンツ ===== */
.container{
  max-width:900px;
  margin:auto;
  padding:100px 20px 40px;
}

h1{
  text-align:center;
  margin-bottom:40px;
}

h2{
  border-left:4px solid rgba(255,255,255,0.7);
  padding-left:10px;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:12px;
  backdrop-filter:blur(8px);
  margin-bottom:30px;
}

/* ===== 画像 ===== */
img{
  width:100%;
  border-radius:10px;
  margin-top:15px;
  box-shadow:0 0 20px rgba(255,255,255,0.2);
}

/* ===== 戻るリンク ===== */
.back{
  display:block;
  text-align:center;
  margin-top:40px;
  color:rgba(255,255,255,0.7);
  text-decoration:none;
}

.back:hover{
  color:white;
}
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<div class="container">

<h1>原稿・レイアウト詳細</h1>

<h2>基本仕様</h2>
<div class="box">
・サイズ：B5想定<br>
・解像度：350dpi<br>
・形式：PSD / PNG / JPEG<br>
・塗り足し：あり
</div>

<h2>レイアウト例</h2>
<div class="box">
サンプルイメージ
<img src="images/sample1.jpg">
</div>

<h2>注意点</h2>
<div class="box">
・文字切れに注意<br>
・重要要素は内側へ配置<br>
・塗り足し外に余白確保
</div>

<a href="index.html" class="back">← トップに戻る</a>

</div>

<script>

/* 光追従（同じ） */
const glow = document.getElementById("glow");
document.addEventListener("mousemove",(e)=>{
  glow.style.left = e.clientX - 90 + "px";
  glow.style.top = e.clientY - 90 + "px";
});

/* 星（軽量版：80個） */
function createStars(){
  for(let i=0;i<80;i++){
    let star = document.createElement("div");
    star.className="star";

    let size = Math.random()*2;

    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random()*window.innerWidth + "px";
    star.style.top = Math.random()*window.innerHeight + "px";

    star.style.opacity = Math.random();

    document.body.appendChild(star);
  }
}
createStars();

</script>

</body>
</html>
