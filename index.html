<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyArtFest2026 Anthology</title>

<style>
body{
  margin:0;
  font-family:"Helvetica","Arial",sans-serif;
  color:white;
  background: linear-gradient(180deg,#061a33,#1b3f6e,#0a2a4a);
  transition: background 1s ease;
  overflow-x:hidden;
}

/* ===== 星 ===== */
.star{
  position:fixed;
  background:white;
  border-radius:50%;
  pointer-events:none;
  opacity:0.8;
}

/* ===== 光追従 ===== */
.glow{
  position:fixed;
  width:180px;
  height:180px;
  background:radial-gradient(circle,rgba(255,255,255,0.25),transparent 70%);
  border-radius:50%;
  pointer-events:none;
  mix-blend-mode:screen;
}

/* ===== ヘッダー ===== */
header{
  text-align:center;
  padding:120px 20px 40px;
}

.title{
  font-size:52px;
  font-weight:bold;
  letter-spacing:3px;
}

.lang button{
  margin:5px;
  padding:6px 12px;
  border-radius:20px;
  border:none;
  cursor:pointer;
}

/* ===== CTA ===== */
.cta{
  margin-top:25px;
  position:relative;
}

.cta a{
  display:inline-block;
  padding:16px 34px;
  background:white;
  color:#1b3f6e;
  font-weight:bold;
  border-radius:40px;
  text-decoration:none;
  transition:0.3s;
}

/* 光リング */
.cta::before{
  content:"";
  position:absolute;
  left:50%;
  top:50%;
  width:170px;
  height:170px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,255,255,0.2),transparent 70%);
  animation:pulse 3s infinite;
  z-index:-1;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(0.8);}
  50%{transform:translate(-50%,-50%) scale(1.2);}
  100%{transform:translate(-50%,-50%) scale(0.8);}
}

/* ===== セクション ===== */
section{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

h2{
  border-left:4px solid rgba(255,255,255,0.7);
  padding-left:10px;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:12px;
  backdrop-filter:blur(8px);
  margin-bottom:20px;
}

/* ===== フッター ===== */
footer{
  text-align:center;
  padding:50px;
  opacity:0.6;
  font-size:12px;
}
</style>
</head>

<body>

<div class="glow" id="glow"></div>

<header>

<div class="title">SkyArtFest 2026</div>

<div class="lang">
<button onclick="setLang('ja')">JP</button>
<button onclick="setLang('en')">EN</button>
</div>

<div class="cta">
<a href="ここにGoogleフォームURL" id="applyBtn" target="_blank">
応募フォームへ
</a>
</div>

</header>

<!-- ▼企画内容（日本語ベース） -->
<section>
<h2 id="t1">０．イベント概要</h2>
<div class="box" id="b1">
TODA HALL & CONFERENCE TOKYO（東京・京橋）<br>
2026年8月15日・16日 / 11:00〜19:00
</div>
</section>

<section>
<h2 id="t2">１．企画概要</h2>
<div class="box" id="b2">
Skyファンアートアンソロジー / B5縦 / 1人1ページ
</div>
</section>

<section>
<h2 id="t3">２．募集条件</h2>
<div class="box" id="b3">
事前応募制 / 無料 / Skyガイドライン遵守
</div>
</section>

<section>
<h2 id="t4">３．原稿仕様</h2>
<div class="box" id="b4">
350dpi / PSD・PNG・JPEG / 塗り足しあり
</div>
</section>

<section>
<h2 id="t5">６．NG事項</h2>
<div class="box" id="b5">
他IP / トレス / R18 / 暴力 / 規定外編集
</div>
</section>

<footer>
SkyArtFest 2026 Anthology Project
</footer>

<script>

/* ===== 光追従 ===== */
const glow = document.getElementById("glow");
document.addEventListener("mousemove",(e)=>{
  glow.style.left = e.clientX - 90 + "px";
  glow.style.top = e.clientY - 90 + "px";
});

/* ===== 星3レイヤー ===== */
function createStars(){
  for(let i=0;i<150;i++){
    let star = document.createElement("div");
    star.className="star";

    let size = Math.random()*2;

    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.left = Math.random()*window.innerWidth + "px";
    star.style.top = Math.random()*window.innerHeight + "px";

    star.style.opacity = Math.random();

    document.body.appendChild(star);
  }
}
createStars();

/* ===== スクロールで夜→夕方（オレンジ） ===== */
window.addEventListener("scroll", () => {

  let max = document.body.scrollHeight - window.innerHeight;
  let t = window.scrollY / max; // 0〜1

  // 色定義
  const night  = { r:6,   g:26,  b:51 };
  const sunset = { r:42,  g:63,  b:107 };
  const dusk   = { r:214, g:138, b:92 };
  const warm   = { r:255, g:179, b:107 };

  let r, g, b;

  if(t < 0.33){
    let k = t / 0.33;

    r = night.r + (sunset.r - night.r) * k;
    g = night.g + (sunset.g - night.g) * k;
    b = night.b + (sunset.b - night.b) * k;

  } else if(t < 0.66){
    let k = (t - 0.33) / 0.33;

    r = sunset.r + (dusk.r - sunset.r) * k;
    g = sunset.g + (dusk.g - sunset.g) * k;
    b = sunset.b + (dusk.b - sunset.b) * k;

  } else {
    let k = (t - 0.66) / 0.34;

    r = dusk.r + (warm.r - dusk.r) * k;
    g = dusk.g + (warm.g - dusk.g) * k;
    b = dusk.b + (warm.b - dusk.b) * k;
  }

  document.body.style.background =
    `linear-gradient(180deg,
      rgb(${r},${g},${b}),
      rgb(${r*0.8},${g*0.8},${b*0.8}),
      rgb(${r*0.5},${g*0.5},${b*0.5})
    )`;

});
/* ===== 英語切替 ===== */
function setLang(lang){

  if(lang === "en"){
    document.getElementById("t1").innerText = "0. Event Overview";
    document.getElementById("t2").innerText = "1. Project";
    document.getElementById("t3").innerText = "2. Requirements";
    document.getElementById("t4").innerText = "3. Specs";
    document.getElementById("t5").innerText = "6. Rules";

    document.getElementById("b1").innerHTML =
    "TODA HALL & CONFERENCE TOKYO / Aug 15-16 2026";

    document.getElementById("b2").innerText =
    "Sky Fanart Anthology / B5 / 1 page per artist";

    document.getElementById("b3").innerText =
    "Application required / Free / Follow guidelines";

document.getElementById("b4").innerText =
    "350dpi / PSD PNG JPEG / Bleed required";

    document.getElementById("b5").innerText =
    "No IP / No tracing / No NSFW / No violence";

    document.getElementById("applyBtn").innerText =
    "Apply Now";
  }

  if(lang === "ja"){
    location.reload();
  }
}

</script>

</body>
</html>
